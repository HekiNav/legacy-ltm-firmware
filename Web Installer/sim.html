<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="sim.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Helsinki LED Train Map Simulator</title>
</head>
<body>
    <div id="svgContainer"></div>
    <div class="logContainer" hidden>
        <p id="log"></p>
    </div>
    <span class="mode">
        <p id="currentMode">lines</p>
        <button id="changeMode">
            <img src="map_icon.svg" alt="Change Map Mode" title="Change Map Mode">
        </button>
    </span>
    <div id="tooltip">test</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.13.3/mqtt.min.js"></script>
    <script src="sim.js"></script>
</body>
</html>
